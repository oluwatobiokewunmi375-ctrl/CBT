apiVersion: v1
kind: Namespace
metadata:
  name: cbt-production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cbt-config
  namespace: cbt-production
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "5000"

---
apiVersion: v1
kind: Secret
metadata:
  name: cbt-secrets
  namespace: cbt-production
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/cbt"
  REDIS_URL: "redis://:password@redis:6379"
  JWT_SECRET: "your-jwt-secret"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbt-api
  namespace: cbt-production
  labels:
    app: cbt-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cbt-api
  template:
    metadata:
      labels:
        app: cbt-api
        version: v1
    spec:
      serviceAccountName: cbt-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: api
        image: ghcr.io/yourdomain/cbt/api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: cbt-config
        - secretRef:
            name: cbt-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health/startup
            port: 5000
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: cbt-uploads

---
apiVersion: v1
kind: Service
metadata:
  name: cbt-api
  namespace: cbt-production
  labels:
    app: cbt-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: cbt-api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cbt-api-hpa
  namespace: cbt-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cbt-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cbt-api-pdb
  namespace: cbt-production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cbt-api

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cbt-uploads
  namespace: cbt-production
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 100Gi